    <nav id="mobile-nav"> <!-- Mobile navigation -->
        <div class="logo-container">Dulain Perera</div>

            <img src="arrow-down.png" alt="Menu" class="mobile-icon"> <!-- Menu icon -->

    <main>
        <!-- Contact form for users to reach out -->
        <form id="contact-form" action="https://api.web3forms.com/submit" method="post">
            
            <input type="hidden" name="access_key" value="95df5f76-881f-4a4c-be7b-f04242ff9e46"> <!-- Hidden field for API key -->

            <h1 class="section-title">Contact Me</h1> <!-- Section title -->

            <label for="name">Name:</label>
            <input type="name" id="name" name="name" required> <!-- Input field for name -->

            <label for="email">Email:</label>
            <input type="email" id="email" name="email" required> <!-- Input field for email -->

            <label for="message">Message:</label>
            <textarea id="message" name="message" rows="4" required></textarea> <!-- Text area for message -->

            <div class="contact-button-container">
                <button type="submit">Submit</button> <!-- Submit button -->
            </div>
        </form>
    </main>
